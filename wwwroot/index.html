<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Personal Finance Tracker</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main>
    <h1>Personal Finance Tracker</h1>
    <section id="add">
      <h2>Add Transaction</h2>
      <form id="txForm">
        <label>Date: <input type="date" id="date"></label>
        <label>Amount: <input type="number" step="0.01" id="amount" required></label>
        <label>Category: <select id="category"></select></label>
        <label>Note: <input type="text" id="note"></label>
        <button type="submit">Add</button>
      </form>
    </section>

    <section id="summary">
      <h2>Summary</h2>
      <div id="summaryBox">
        <div>Balance: <span id="balance">0.00</span></div>
        <div>Income: <span id="income">0.00</span></div>
        <div>Expenses: <span id="expenses">0.00</span></div>
      </div>
      <button id="exportBtn">Export CSV</button>
    </section>

    <section id="list">
      <h2>Recent Transactions</h2>
      <table id="txTable">
        <thead><tr><th>Date</th><th>Amount</th><th>Category</th><th>Note</th><th>Actions</th></tr></thead>
        <tbody></tbody>
      </table>
    </section>
  </main>
  <script src="/app.js"></script>
</body>
</html>
